<nav class="navbar">
    <div class="nav-links">
        <a routerLink="/shopping" routerLinkActive="active">Shopping</a>
        <div class="dropdown">
            <span class="dropdown-trigger">Cart &#9662;</span>
            <div class="dropdown-content">
                <a routerLink="/cart" routerLinkActive="active">Current Cart</a>
                <ng-container *ngIf="isEmployee$ | async">
                    <a *ngIf="isAdmin$ | async" routerLink="/revenue" routerLinkActive="active">Revenue Statistics</a>
                    <a routerLink="/vip" routerLinkActive="active">VIP Customers</a>
                </ng-container>
            </div>
        </div>
    </div>
    <div class="user-section">
        <span *ngIf="isLoggedIn$ | async; else loginLink">
            Welcome {{ (user$ | async)?.name }}
            <button (click)="logout()" class="logout-btn">X</button>
        </span>
        <ng-template #loginLink>
            <a routerLink="/login" routerLinkActive="active">Login</a>
        </ng-template>
    </div>
</nav>
