<div class="cart-container">
    <h2>Your Current Cart</h2>

    <div *ngIf="cartItems.length === 0" class="empty-msg">
        Your cart is empty. Go back to shopping.
    </div>

    <div *ngIf="cartItems.length > 0">
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Model</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of cartItems">
                    <td>{{ item.product.name }}</td>
                    <td>{{ item.product.model }}</td>
                    <td>${{ item.product.price }}</td>
                    <td>
                        <input type="number" min="1" [(ngModel)]="item.quantity"
                            (change)="updateQuantity(item.product._id, item.quantity)" class="qty-input">
                    </td>
                    <td>${{ item.product.price * item.quantity }}</td>
                    <td>
                        <button class="remove-btn" (click)="removeItem(item.product._id)">Remove</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="cart-summary">
            <h3>Total Amount: <span class="total-price">${{ totalAmount }}</span></h3>
            <button class="checkout-btn" (click)="checkout()">Process Payment & Finish</button>
        </div>
    </div>
</div>
